version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: festai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: festivaldb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes: # 데이터 영구 저장
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.0
    container_name: festai-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: festai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: festai-kafka
    depends_on: # zookeeper가 먼저 실행된 후에 kafka 실행
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # 데이터 복제 수

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: festai-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: festivaldb
      DB_USER: admin
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on: # postgres, redis 실행 후 backend 실행
      - postgres
      - redis
    networks:
      - festai-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: festai-frontend
    ports:
      - "3000:3000"
    depends_on: # backend 실행 후 frontend 실행
      - backend
    networks:
      - festai-network
  
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: festai-ai
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: festivaldb
      DB_USER: admin
      DB_PASSWORD: password
      OPENAI_API_KEY: ${OPENAI_API_KEY} # ${} = 환경변수에서 가져오기
    depends_on: # DB 먼저 실행 후 AI 서비스 실행
      - postgres
    networks:
      - festai-network

volumes: # Docker가 관리하는 저장공간 선언
  postgres-data:

networks:
  festai-network:
    driver: bridge